name: Code Quality & Security

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  lint-typecheck-build:
    name: ${{ matrix.service.name }} / lint, typecheck, build
    runs-on: [self-hosted, linux, x64, mdkli]
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            path: backend/auth
          - name: booking-service
            path: backend/booking-service
          - name: chat-service
            path: backend/chat-service
          - name: admin-service
            path: backend/admin-service
          - name: search-service
            path: backend/search-service
          - name: frontend
            path: frontend
    defaults:
      run:
        working-directory: ${{ matrix.service.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Biome check (lint + format)
        run: npx @biomejs/biome check --write .

      - name: TypeScript type check
        run: npm run typecheck --if-present || npx tsc --noEmit

      - name: Build
        run: npm run build --if-present

  codeql:
    name: CodeQL
    runs-on: [self-hosted, linux, x64, mdkli]
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  semgrep:
    name: Semgrep
    runs-on: [self-hosted, linux, x64, mdkli]
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/typescript \
            --config=p/react \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --sarif \
            --output=semgrep.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  gitleaks:
    name: Gitleaks
    runs-on: [self-hosted, linux, x64, mdkli]
    permissions:
      contents: read
    container:
      image: ghcr.io/gitleaks/gitleaks:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact

  osv-scanner:
    name: OSV Scanner
    runs-on: [self-hosted, linux, x64, mdkli]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv-results.sarif
            ./
        continue-on-error: true

      - name: Check for SARIF file
        id: check-osv-sarif
        if: always()
        run: |
          if [ -f osv-results.sarif ]; then
            echo "sarif_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "sarif_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload OSV SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.check-osv-sarif.outputs.sarif_exists == 'true'
        with:
          sarif_file: osv-results.sarif

  npm-audit:
    name: ${{ matrix.service.name }} / npm audit
    runs-on: [self-hosted, linux, x64, mdkli]
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            path: backend/auth
          - name: booking-service
            path: backend/booking-service
          - name: chat-service
            path: backend/chat-service
          - name: admin-service
            path: backend/admin-service
          - name: search-service
            path: backend/search-service
          - name: frontend
            path: frontend
    defaults:
      run:
        working-directory: ${{ matrix.service.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  scorecard:
    name: OpenSSF Scorecard
    runs-on: [self-hosted, linux, x64, mdkli]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
