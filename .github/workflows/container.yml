name: Container Build & Security

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # Hadolint - Dockerfile linting, per service (matrix)
  hadolint:
    name: ${{ matrix.service.name }} / Hadolint
    runs-on: [self-hosted, linux, x64, mdkli]
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            path: backend/auth
          - name: booking-service
            path: backend/booking-service
          - name: chat-service
            path: backend/chat-service
          - name: admin-service
            path: backend/admin-service
          - name: search-service
            path: backend/search-service
          - name: frontend
            path: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.service.path }}/Dockerfile
          failure-threshold: warning

  # docker compose config - validate the compose file resolves cleanly
  compose-validate:
    name: docker compose config
    runs-on: [self-hosted, linux, x64, mdkli]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dummy .env for validation
        run: |
          cat <<'EOF' > .env
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          JWT_SECRET=dummy
          REFRESH_SECRET=dummy
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          MEILI_MASTER_KEY=dummy
          RABBITMQ_DEFAULT_USER=admin
          RABBITMQ_DEFAULT_PASS=admin
          EOF

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  # Build, SBOM, scan - per service (matrix)
  build-scan-push:
    name: ${{ matrix.service.name }} / build, scan, push
    runs-on: [self-hosted, linux, x64, mdkli]
    needs: [hadolint, compose-validate]
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            path: backend/auth
            image: mdkli-auth-service
          - name: booking-service
            path: backend/booking-service
            image: mdkli-booking-service
          - name: chat-service
            path: backend/chat-service
            image: mdkli-chat-service
          - name: admin-service
            path: backend/admin-service
            image: mdkli-admin-service
          - name: search-service
            path: backend/search-service
            image: mdkli-search-service
          - name: frontend
            path: frontend
            image: mdkli-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{
            matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: false
          load: true
          tags: local/${{ matrix.service.image }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0.17.0
        with:
          image: local/${{ matrix.service.image }}:${{ github.sha }}
          format: spdx-json
          output-file: ${{ matrix.service.name }}-sbom.spdx.json
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service.name }}
          path: ${{ matrix.service.name }}-sbom.spdx.json
          retention-days: 30

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/${{ matrix.service.image }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service.name }}.sarif
          category: trivy-${{ matrix.service.name }}

      - name: Fail build on critical vulnerabilities
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/${{ matrix.service.image }}:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push image to GHCR
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            "${REGISTRY}/${{ github.repository_owner }}/${{ matrix.service.image }}@${{ steps.push.outputs.digest }}"

      - name: Verify signature (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${REGISTRY}/${{ github.repository_owner }}/${{ matrix.service.image }}@${{ steps.push.outputs.digest }}"
