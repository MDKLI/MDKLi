events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server {
    listen 4173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve real static files (JS, CSS, images) directly with caching
    location /assets/ {
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # SPA fallback — let your router (TanStack Router) handle all routes,
    # including your custom 401/403/404/500/503 error components
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
