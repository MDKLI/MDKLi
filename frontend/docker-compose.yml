services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - landing
      - dashboard

  landing:
    build: ./home
    expose:
      - "3000"

  dashboard:
    build: .
    expose:
      - "4173"
  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000
    expose:
      - "4174"
    depends_on:
      - auth-service
