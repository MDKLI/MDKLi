version: '3.8'

services:
  runner-1:
    image: myoung34/github-runner:latest
    container_name: mdkli-runner-1
    environment:
      - REPO_URL=${REPO_URL}
      - ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN}
      - RUNNER_NAME=mdkli-runner-1
      - RUNNER_WORKDIR=/tmp/runner1_work
      - RUNNER_GROUP=default
      - LABELS=${RUNNER_LABELS}
      - EPHEMERAL=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/runner1_work:/tmp/runner1_work
      - runner1_npm_cache:/home/runner/.npm
      - buildx_cache:/tmp/.buildx-cache
      - trivy_cache:/tmp/.trivy-cache
    restart: unless-stopped

  runner-2:
    image: myoung34/github-runner:latest
    container_name: mdkli-runner-2
    environment:
      - REPO_URL=${REPO_URL}
      - ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN}
      - RUNNER_NAME=mdkli-runner-2
      - RUNNER_WORKDIR=/tmp/runner2_work
      - RUNNER_GROUP=default
      - LABELS=${RUNNER_LABELS}
      - EPHEMERAL=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/runner2_work:/tmp/runner2_work
      - runner2_npm_cache:/home/runner/.npm
      - buildx_cache:/tmp/.buildx-cache
      - trivy_cache:/tmp/.trivy-cache
    restart: unless-stopped

  runner-3:
    image: myoung34/github-runner:latest
    container_name: mdkli-runner-3
    environment:
      - REPO_URL=${REPO_URL}
      - ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN}
      - RUNNER_NAME=mdkli-runner-3
      - RUNNER_WORKDIR=/tmp/runner3_work
      - RUNNER_GROUP=default
      - LABELS=${RUNNER_LABELS}
      - EPHEMERAL=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/runner3_work:/tmp/runner3_work
      - runner3_npm_cache:/home/runner/.npm
      - buildx_cache:/tmp/.buildx-cache
      - trivy_cache:/tmp/.trivy-cache
    restart: unless-stopped

  runner-4:
    image: myoung34/github-runner:latest
    container_name: mdkli-runner-4
    environment:
      - REPO_URL=${REPO_URL}
      - ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN}
      - RUNNER_NAME=mdkli-runner-4
      - RUNNER_WORKDIR=/tmp/runner4_work
      - RUNNER_GROUP=default
      - LABELS=${RUNNER_LABELS}
      - EPHEMERAL=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/runner4_work:/tmp/runner4_work
      - runner4_npm_cache:/home/runner/.npm
      - buildx_cache:/tmp/.buildx-cache
      - trivy_cache:/tmp/.trivy-cache
    restart: unless-stopped

volumes:
  runner1_npm_cache:
  runner2_npm_cache:
  runner3_npm_cache:
  runner4_npm_cache:
  buildx_cache:
  trivy_cache:
