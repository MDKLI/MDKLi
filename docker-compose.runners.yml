version: '3.8'

services:
  runner-1:
    image: myoung34/github-runner:latest
    container_name: mdkli-runner-1
    environment:
      - REPO_URL=${REPO_URL}
      - ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN}
      - RUNNER_NAME=mdkli-runner-1
      - RUNNER_WORKDIR=/tmp/runner/work
      - RUNNER_GROUP=default
      - LABELS=${RUNNER_LABELS}
      - EPHEMERAL=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner1_work:/tmp/runner/work
    restart: unless-stopped

  runner-2:
    image: myoung34/github-runner:latest
    container_name: mdkli-runner-2
    environment:
      - REPO_URL=${REPO_URL}
      - ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN}
      - RUNNER_NAME=mdkli-runner-2
      - RUNNER_WORKDIR=/tmp/runner/work
      - RUNNER_GROUP=default
      - LABELS=${RUNNER_LABELS}
      - EPHEMERAL=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner2_work:/tmp/runner/work
    restart: unless-stopped

volumes:
  runner1_work:
  runner2_work:
